services:
  - type: web
    name: edgeshield-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "8000"
      - key: JWT_SECRET
        value: "generate_a_secure_random_key_here"

  - type: web
    name: edgeshield-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://edgeshield-backend.onrender.com"
